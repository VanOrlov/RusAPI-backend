name: Deploy Backend to VPS

on:
  push:
    branches:
      - main # Если твоя главная ветка называется master, поменяй здесь

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Даем GitHub Actions права на запись образов в твой реестр
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Скачиваем код
        uses: actions/checkout@v4

      - name: 🔑 Логин в GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Этот токен GitHub генерирует сам, его не нужно было добавлять в секреты!

      - name: 🔤 Приводим имя репозитория к нижнему регистру (требование Docker)
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: 🛠️ Сборка и пуш Docker-образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest

      - name: 🚀 Деплой на сервер по SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/rusapi

            # 1. Авторизуемся в GHCR на сервере, чтобы он имел право скачать твой образ
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Магия: генерируем .env файл на лету из секретов GitHub!
            echo "DB_HOST=postgres" > .env
            echo "DB_PORT=5432" >> .env
            echo "DB_USER=ivanorlov_prod" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=rusapi_prod" >> .env
            echo "DB_SYNC=true" >> .env
            echo "REDIS_HOST=redis" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "PORT=3000" >> .env
            echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" >> .env
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env

            # 3. Скачиваем свежий скомпилированный образ
            docker compose pull backend

            # 4. Перезапускаем контейнеры (Докер сам поймет, что обновился только бэкенд, и не тронет базу)
            docker compose up -d backend